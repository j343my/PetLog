<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiffy - Suivi Mars 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark-blue: #2c3e50;
    --med-blue: #3498db;
    --light-blue: #d6eaf8;
    --dark-green: #27ae60;
    --light-green: #d5f5e3;
    --gray: #7f8c8d;
    --light-gray: #ecf0f1;
    --border-gray: #bdc3c7;
  }

  body {
    font-family: 'Nunito', Arial, sans-serif;
    background: #f0f2f5;
    color: var(--dark-blue);
  }

  /* ── Print button (hidden on print) ── */
  .no-print {
    text-align: center;
    padding: 24px;
    background: var(--dark-blue);
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .no-print h1 { font-size: 1.4rem; margin-bottom: 8px; }
  .no-print p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 12px; }
  .print-btn {
    background: var(--med-blue);
    color: white;
    border: none;
    padding: 12px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .print-btn:hover { background: #2980b9; }

  /* ── Page container ── */
  .day-page {
    width: 210mm;
    min-height: 295mm;
    margin: 16px auto;
    background: white;
    padding: 10mm 12mm;
    box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    border-radius: 4px;
    page-break-after: always;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--dark-blue);
    border-radius: 8px;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    margin-bottom: 5mm;
  }
  .header-left h2 { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
  .header-left span { font-size: 0.75rem; opacity: 0.7; }
  .header-right { text-align: right; }
  .header-right .day-num { font-size: 2.2rem; font-weight: 900; line-height: 1; }
  .header-right .day-name { font-size: 0.95rem; font-weight: 600; opacity: 0.85; }

  /* ── Section titles ── */
  .section-title {
    border-radius: 6px;
    padding: 5px 14px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3mm;
    font-size: 0.95rem;
  }
  .section-title.med { background: var(--med-blue); }
  .section-title.food { background: var(--dark-green); }
  .section-title .hint { font-weight: 400; font-size: 0.72rem; opacity: 0.85; }

  /* ── Medication rows ── */
  .med-list { margin-bottom: 2mm; }

  .med-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 6px;
    border: 1.5px solid;
    padding: 4px 12px;
    margin-bottom: 2.5mm;
    min-height: 11mm;
  }
  .med-row.emeprid   { background: #ebf5fb; border-color: #aed6f1; }
  .med-row.felimazole{ background: #fef9e7; border-color: #f9e79f; }
  .med-row.b12       { background: #f4ecf7; border-color: #d7bde2; }
  .med-row.mirataz   { background: #eafaf1; border-color: #a9dfbf; }
  .med-row.cerenia   { background: #fce4ec; border-color: #f48fb1; }

  .med-name { font-weight: 800; font-size: 0.9rem; }

  .med-doses { display: flex; gap: 16px; }

  .dose-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dose-label { font-size: 0.78rem; color: #555; font-weight: 600; }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid #555;
    border-radius: 3px;
    background: white;
    display: inline-block;
    flex-shrink: 0;
  }

  /* ── Med notes line ── */
  .med-notes {
    font-size: 0.72rem;
    color: var(--gray);
    margin-bottom: 4mm;
    border-bottom: 1px dashed var(--border-gray);
    padding-bottom: 2px;
  }

  /* ── Food table ── */
  .food-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 3mm;
    font-size: 0.78rem;
  }
  .food-table th {
    background: #229954;
    color: white;
    padding: 4px 6px;
    font-weight: 700;
    font-size: 0.76rem;
    text-align: center;
    border: 1px solid #1e8449;
  }
  .food-table td {
    border: 1px solid #d5d8dc;
    padding: 3.5px 6px;
    height: 9mm;
    vertical-align: middle;
  }
  .food-table .meal-header {
    background: var(--light-green);
    font-weight: 800;
    color: #1e8449;
    text-align: left;
    font-size: 0.82rem;
    padding: 3px 10px;
  }
  .food-table .row-even { background: #fafafa; }
  .food-table .row-odd  { background: #ffffff; }
  .food-table .row-num {
    color: #d0d0d0;
    font-size: 0.65rem;
    padding-left: 8px;
  }
  .food-table .col-repas   { width: 15%; }
  .food-table .col-produit { width: 35%; }
  .food-table .col-depart  { width: 16%; text-align: center; }
  .food-table .col-fin     { width: 16%; text-align: center; }
  .food-table .col-mange   { width: 18%; text-align: center; }

  /* ── Total row ── */
  .total-bar {
    background: #f9e79f;
    border: 2px solid #f4d03f;
    border-radius: 6px;
    padding: 5px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 3mm;
  }
  .total-bar .total-label { font-weight: 900; font-size: 1rem; }
  .total-box {
    width: 50mm;
    height: 10mm;
    border: 2px solid var(--dark-blue);
    background: white;
    border-radius: 4px;
    display: inline-block;
  }
  .total-bar .unit { font-size: 0.85rem; color: var(--gray); }

  /* ── Observations ── */
  .observations {
    border: 1.5px solid #d5d8dc;
    border-radius: 6px;
    padding: 5px 12px 8px;
    min-height: 22mm;
  }
  .observations .obs-title {
    font-weight: 800;
    font-size: 0.78rem;
    margin-bottom: 4px;
  }
  .obs-line {
    border-bottom: 1px dashed #d5d8dc;
    height: 7mm;
  }

  /* ── Footer ── */
  .page-footer {
    text-align: center;
    font-size: 0.55rem;
    color: var(--gray);
    margin-top: 3mm;
  }

  /* ════════════════════════════════════════════
     PRINT STYLES
     ════════════════════════════════════════════ */
  @media print {
    .no-print { display: none !important; }
    body { background: white; }
    .day-page {
      width: 210mm;
      min-height: auto;
      margin: 0;
      padding: 8mm 10mm;
      box-shadow: none;
      border-radius: 0;
      page-break-after: always;
      page-break-inside: avoid;
    }
    .day-page:last-child { page-break-after: auto; }
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }
</style>
</head>
<body>

<div class="no-print">
  <h1>Suivi de Swiffy - Mars 2026</h1>
  <p>31 pages - une par jour - medicaments + alimentation</p>
  <button class="print-btn" onclick="window.print()">Imprimer / Enregistrer en PDF</button>
</div>

<script>
const weekdays = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

const meds = [
  { name:"Emeprid (2.5 ml)",        css:"emeprid",    doses:["Matin","Midi","Soir"] },
  { name:"Felimazole",               css:"felimazole", doses:["Matin","Soir"] },
  { name:"B12 (1 fois par semaine)", css:"b12",        doses:["Fait"] },
  { name:"Mirataz (tous les soirs)", css:"mirataz",    doses:["Soir"] },
  { name:"Cerenia",                  css:"cerenia",    doses:["Fait"] },
];

const meals = [
  { name:"MATIN", rows:3 },
  { name:"MIDI",  rows:3 },
  { name:"SOIR",  rows:3 },
  { name:"AUTRE", rows:2 },
];

for (let day = 1; day <= 31; day++) {
  const d = new Date(2026, 2, day);
  const jourNom = weekdays[d.getDay()];

  // Medication rows HTML
  let medsHTML = '';
  for (const med of meds) {
    let dosesHTML = '';
    for (const dose of med.doses) {
      dosesHTML += `<div class="dose-item">
        <span class="dose-label">${dose}</span>
        <span class="checkbox"></span>
      </div>`;
    }
    medsHTML += `<div class="med-row ${med.css}">
      <span class="med-name">${med.name}</span>
      <div class="med-doses">${dosesHTML}</div>
    </div>`;
  }

  // Food table HTML
  let foodRows = '';
  for (const meal of meals) {
    foodRows += `<tr><td class="meal-header" colspan="5">${meal.name}</td></tr>`;
    for (let r = 0; r < meal.rows; r++) {
      const cls = r % 2 === 0 ? 'row-even' : 'row-odd';
      foodRows += `<tr class="${cls}">
        <td class="col-repas row-num">${r+1}.</td>
        <td class="col-produit"></td>
        <td class="col-depart"></td>
        <td class="col-fin"></td>
        <td class="col-mange"></td>
      </tr>`;
    }
  }

  const page = document.createElement('div');
  page.className = 'day-page';
  page.innerHTML = `
    <div class="header">
      <div class="header-left">
        <h2>SWIFFY</h2>
        <span>Suivi quotidien - Mars 2026</span>
      </div>
      <div class="header-right">
        <div class="day-num">${day}</div>
        <div class="day-name">${jourNom}</div>
      </div>
    </div>

    <div class="section-title med">
      <strong>MEDICAMENTS</strong>
      <span class="hint">Cocher apres chaque prise</span>
    </div>
    <div class="med-list">${medsHTML}</div>
    <div class="med-notes">Notes medicaments : ________________________________________________________</div>

    <div class="section-title food">
      <strong>ALIMENTATION</strong>
      <span class="hint">Noter chaque repas avec les grammes</span>
    </div>
    <table class="food-table">
      <thead>
        <tr>
          <th class="col-repas">Repas</th>
          <th class="col-produit">Produit</th>
          <th class="col-depart">Depart (g)</th>
          <th class="col-fin">Fin (g)</th>
          <th class="col-mange">Mange (g)</th>
        </tr>
      </thead>
      <tbody>${foodRows}</tbody>
    </table>

    <div class="total-bar">
      <span class="total-label">TOTAL DU JOUR :</span>
      <span class="total-box"></span>
      <span class="unit">grammes</span>
    </div>

    <div class="observations">
      <div class="obs-title">Observations (appetit, vomissements, selles, comportement...) :</div>
      <div class="obs-line"></div>
      <div class="obs-line"></div>
      <div class="obs-line"></div>
    </div>

    <div class="page-footer">Swiffy - Suivi Mars 2026 - Page ${day}/31</div>
  `;
  document.body.appendChild(page);
}
</script>

</body>
</html>
